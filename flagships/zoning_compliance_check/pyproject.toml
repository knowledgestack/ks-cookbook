[project]
name = "ks-cookbook-zoning-check"
version = "0.1.0"
description = "Real estate flagship — zoning compliance check against Austin TX LDC (LangGraph ReAct)."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.50",
    "langchain-mcp-adapters>=0.0.5",
    "langchain-openai>=0.2",
    "langchain-core>=0.3",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-zoning-check = "zoning_compliance_check.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/zoning_compliance_check"]

[tool.ruff]
line-length = 88
target-version = "py311"
