[project]
name = "ks-cookbook-research-brief"
version = "0.1.0"
description = "Topic → cited .docx research brief using pydantic-ai + Knowledge Stack MCP."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
    "python-docx>=1.1",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.5"]

[project.scripts]
ks-cookbook-research-brief = "research_brief.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/research_brief"]

[tool.ruff]
line-length = 88
target-version = "py311"
