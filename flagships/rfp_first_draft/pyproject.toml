[project]
name = "ks-cookbook-rfp-draft"
version = "0.1.0"
description = "Sales flagship — draft RFP responses grounded in past proposals (pydantic-ai)."
readme = "README.md"
keywords = ["sales", "rfp", "proposals", "go-to-market"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-rfp-draft = "rfp_first_draft.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rfp_first_draft"]

[tool.ruff]
line-length = 88
target-version = "py311"
