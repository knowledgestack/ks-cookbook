[project]
name = "ks-cookbook-release-notes"
version = "0.1.0"
description = "Release tag → customer-facing notes grounded in specs + migration guide."
readme = "README.md"
keywords = ["product", "engineering", "release-notes"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-release-notes = "release_notes_generator.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/release_notes_generator"]
