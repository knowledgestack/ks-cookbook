[project]
name = "ks-cookbook-voice-sdr"
version = "0.1.0"
description = "Sales flagship — live SDR agent on the OpenAI Realtime API with KS MCP tool proxy (voice + text)."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "openai>=1.51",
    "mcp>=1.0",
    "pydantic>=2.6",
    "pydantic-ai>=0.0.14",
]

[project.optional-dependencies]
voice = [
    "sounddevice>=0.4.7",
    "numpy>=1.26",
]

[project.scripts]
ks-cookbook-voice-sdr = "realtime_voice_sdr.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/realtime_voice_sdr"]
