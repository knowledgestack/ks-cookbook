[project]
name = "ks-cookbook-battlecard"
version = "0.1.0"
description = "Competitor name → battlecard with differentiators, objection handlers, win themes."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-battlecard = "sales_battlecard.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sales_battlecard"]
