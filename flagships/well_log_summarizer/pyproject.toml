[project]
name = "ks-cookbook-well-log"
version = "0.1.0"
description = "Energy flagship — summarize drilling reports + well logs with HSE / equipment / formation events, fully cited."
readme = "README.md"
keywords = ["energy", "oil-and-gas", "well-logs", "geology"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-well-log = "well_log_summarizer.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/well_log_summarizer"]
