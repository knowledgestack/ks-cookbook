[project]
name = "ks-cookbook-pia"
version = "0.1.0"
description = "New feature description → PIA memo citing GDPR + company template."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-pia = "privacy_impact_assessment.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/privacy_impact_assessment"]
