[project]
name = "ks-cookbook-subro-review"
version = "0.1.0"
description = "Insurance flagship — P&C subrogation recovery opportunity assessment (raw OpenAI function calling)."
readme = "README.md"
keywords = ["insurance", "subrogation", "claims"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "openai>=1.40",
    "ksapi>=0.1.0",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-subro-review = "subrogation_opportunity_review.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/subrogation_opportunity_review"]

[tool.ruff]
line-length = 88
target-version = "py311"
