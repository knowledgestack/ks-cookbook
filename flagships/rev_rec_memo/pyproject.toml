[project]
name = "ks-cookbook-rev-rec-memo"
version = "0.1.0"
description = "Accounting flagship — ASC 606 revenue recognition memo grounded in your company's rev-rec policy."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai>=0.0.14",
    "pydantic>=2.6",
    "mcp>=1.0",
]

[project.scripts]
ks-cookbook-rev-rec-memo = "rev_rec_memo.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/rev_rec_memo"]

[tool.ruff]
line-length = 88
target-version = "py311"
