[project]
name = "ks-cookbook-prior-auth"
version = "0.1.0"
description = "Prior-authorization letter drafter — clinical scenario → cited appeal letter grounded in a KS policy corpus."
readme = "README.md"
keywords = ["healthcare", "prior-auth", "payer", "clinical"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
    "python-docx>=1.1",
]

[project.scripts]
ks-cookbook-prior-auth = "prior_auth_letter.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/prior_auth_letter"]

[tool.ruff]
line-length = 88
target-version = "py311"
