[project]
name = "ks-cookbook-tax-memo"
version = "0.1.0"
description = "Tax flagship — tax position research memo citing IRC + Treasury Regs (LangGraph ReAct)."
readme = "README.md"
keywords = ["tax", "irc", "research", "memos"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "langgraph>=0.2.50",
    "langchain-mcp-adapters>=0.0.5",
    "langchain-openai>=0.2",
    "langchain-core>=0.3",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-tax-memo = "tax_position_memo.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tax_position_memo"]

[tool.ruff]
line-length = 88
target-version = "py311"
