[project]
name = "ks-cookbook-nerc-evidence"
version = "0.1.0"
description = "Energy flagship — NERC CIP compliance evidence pack memo (pydantic-ai)."
readme = "README.md"
keywords = ["energy", "nerc-cip", "compliance", "utilities"]
license = { text = "MIT" }
requires-python = ">=3.11"
dependencies = [
    "pydantic-ai[mcp]>=0.0.14",
    "pydantic>=2.6",
]

[project.scripts]
ks-cookbook-nerc-evidence = "nerc_compliance_evidence.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nerc_compliance_evidence"]

[tool.ruff]
line-length = 88
target-version = "py311"
