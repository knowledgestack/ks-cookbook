name: Release

on:
  push:
    tags: ["v*"]

jobs:
  publish-mcp-python:
    runs-on: ubuntu-latest
    # Trusted publishing — no API token, configured on PyPI project settings.
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build knowledgestack-mcp
        run: |
          cd mcp-python
          uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp-python/dist
