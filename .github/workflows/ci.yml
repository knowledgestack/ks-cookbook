name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install workspace
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Test MCP server (mocked)
        run: uv run --package knowledgestack-mcp --extra dev pytest mcp-python/tests/ -v
