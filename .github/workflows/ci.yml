name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install workspace
        run: uv sync --all-packages

      - name: Lint
        run: uv run ruff check .

      - name: Smoke-test every recipe + flagship CLI
        # Runs `--help` on 100 recipes + 32 flagships. Catches imports, argparse,
        # pydantic schemas, shared-module breakage. No tenant required.
        run: uv run python scripts/smoke_recipes.py

      - name: MCP server tests (run in ks-mcp repo)
        run: echo "MCP server moved to https://github.com/knowledgestack/ks-mcp — tests run there."
